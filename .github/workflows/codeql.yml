name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: github/codeql-action/init@f9f07eeea7240ef3dd7e1c202711d36f0d5f6b84
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@f9f07eeea7240ef3dd7e1c202711d36f0d5f6b84
      - uses: github/codeql-action/analyze@f9f07eeea7240ef3dd7e1c202711d36f0d5f6b84
