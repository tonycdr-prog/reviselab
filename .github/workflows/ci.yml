name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: supabase/setup-cli@v2.0.0
        with:
          version: 2.90.0
      - uses: pnpm/action-setup@v6.0.4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.14.0
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @reviselab/web exec playwright install --with-deps chromium
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:visual
      - run: pnpm build
      - run: supabase start
      - run: pnpm db:reset
      - run: pnpm db:test
      - run: pnpm db:types:verify
      - if: ${{ always() }}
        run: supabase stop --no-backup
      - name: Upload CI failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ci-failure-artifacts
          path: |
            apps/web/test-results/**
            apps/web/playwright-report/**
          if-no-files-found: ignore
          retention-days: 7
