project_id = "reviselab"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.migrations]
enabled = true
schema_paths = ["./migrations/*.sql"]

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/**",
  "http://localhost:3001",
  "http://localhost:3001/auth/callback",
  "http://localhost:3001/**",
  "http://127.0.0.1:3001",
  "http://127.0.0.1:3001/auth/callback",
  "http://127.0.0.1:3001/**",
  "http://127.0.0.1:3000",
  "http://127.0.0.1:3000/auth/callback",
  "http://127.0.0.1:3000/**",
  "https://127.0.0.1:3000",
  "https://127.0.0.1:3000/auth/callback",
  "https://127.0.0.1:3001",
  "https://127.0.0.1:3001/auth/callback",
]

[auth.email]
enable_signup = true
enable_confirmations = false
