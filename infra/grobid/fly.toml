app = "reviselab-grobid"
primary_region = "iad"

[build]
  image = "grobid/grobid:0.8.2-crf"

[processes]
  app = "./grobid-service/bin/grobid-service"

[env]
  JAVA_TOOL_OPTIONS = "-XX:-UseContainerSupport"

[http_service]
  internal_port = 8070
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/api/isalive"

[[vm]]
  memory = "4096mb"
  cpu_kind = "shared"
  cpus = 2
